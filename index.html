  <!-- Instant paint: match Flutter splash (gradient + logo) while CanvasKit loads -->
  <style>
    :root {
      --oeg-primary: #D040C9;
      --oeg-primary-dark: #8A0084;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--oeg-primary-dark) 0%, var(--oeg-primary) 100%);
      overflow: hidden;
    }

    #oeg-bootstrap-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--oeg-primary-dark);
      background-image:
        url('splash/background.png'),
        linear-gradient(135deg, var(--oeg-primary-dark) 0%, var(--oeg-primary) 100%);
      background-size: cover, cover;
      background-position: center, center;
      background-repeat: no-repeat, no-repeat;
      transition: opacity 0.2s ease-out;
    }

    #oeg-bootstrap-splash.oeg-bootstrap-splash--hide {
      opacity: 0;
      pointer-events: none;
    }

    #oeg-bootstrap-splash .oeg-logo {
      display: block;
      width: min(200px, 42vw);
      height: min(200px, 42vw);
      object-fit: contain;
      /* White logo only: drop baked-in black square from source PNG */
      mix-blend-mode: screen;
    }

    #oeg-bootstrap-splash .oeg-bootstrap-progress {
      margin-top: 40px;
      width: min(250px, 60vw);
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    #oeg-bootstrap-splash .oeg-bootstrap-progress-bar {
      width: 35%;
      height: 100%;
      border-radius: 2px;
      background: var(--oeg-primary);
      animation: oeg-bootstrap-indeterminate 1.2s ease-in-out infinite;
    }

    @keyframes oeg-bootstrap-indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(320%); }
    }
  </style>
  <link rel="preload" href="splash/logo.png" as="image">
  <link rel="preload" href="splash/background.png" as="image">
</head>
<body>
  <div id="oeg-bootstrap-splash" aria-hidden="true">
    <img
      id="oeg-bootstrap-logo"
      class="oeg-logo"
      src="splash/logo.png"
      alt="OurEasyGame"
      width="200"
      height="200"
      decoding="async"
      fetchpriority="high">
    <div class="oeg-bootstrap-progress" role="progressbar" aria-label="Loading">
      <div class="oeg-bootstrap-progress-bar"></div>
    </div>
  </div>
  <script>
    (function () {
      function assetUrl(path) {
        try {
          return new URL(path, document.baseURI).toString();
        } catch (e) {
          return path;
        }
      }

      var splash = document.getElementById('oeg-bootstrap-splash');
      var logo = document.getElementById('oeg-bootstrap-logo');
      if (splash) {
        splash.style.backgroundImage =
          "url('" + assetUrl('splash/background.png') + "'), " +
          "linear-gradient(135deg, #8A0084 0%, #D040C9 100%)";
      }
      if (logo) {
        logo.src = assetUrl('splash/logo.png');
      }

      function removeBootstrapSplash() {
        var splash = document.getElementById('oeg-bootstrap-splash');
        if (!splash || splash.dataset.removed === '1') return;
        splash.dataset.removed = '1';
        splash.classList.add('oeg-bootstrap-splash--hide');
        setTimeout(function () {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
          document.documentElement.style.overflow = '';
          document.body.style.overflow = '';
        }, 220);
      }

      window.addEventListener('flutter-first-frame', removeBootstrapSplash);
      // Safety net if first-frame event is missed
      setTimeout(removeBootstrapSplash, 25000);
    })();
  </script>
    <!--
      Do not register flutter_service_worker.js here — flutter_bootstrap.js already
      manages the service worker. A second register() causes activation races and
      the "prepareServiceWorker took more than 4000ms" warning.
    -->
    <!--
      MeetHour plugin on Web expects a global `MeetHourExternalAPI`.
      When the real MeetHour external script is not loaded (or not ready yet),
      the plugin crashes with:
      "ReferenceError: MeetHourExternalAPI is not defined".

      Provide a minimal stub so the app can boot.
      (Full MeetHour video functionality still requires MeetHour's real script.)
    -->
    <script>
      (function () {
        if (typeof window.MeetHourExternalAPI === 'undefined') {
          // Constructor-like stub to keep plugin registration from crashing.
          window.MeetHourExternalAPI = function MeetHourExternalAPIStub() {};
          window.MeetHourExternalAPI.prototype.init = function () {};
        }
      })();
    </script>
    <!--
      MeetHour web plugin injects its own scripts.
      Keeping an additional manual include here causes duplicate execution and crashes with:
      "Identifier 'MeetHourAPI' has already been declared".
    -->
    <script src="flutter_bootstrap.js" async></script>
</body>
